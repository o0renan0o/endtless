name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild EndtlessPack.zip from source
        run: |
          rm -f EndtlessPack.zip
          cd 1_ResourcePack
          zip -rq ../EndtlessPack.zip pack.mcmeta assets
          cd ..

      - name: Rebuild EndtlessDatapack.zip from source
        run: |
          rm -f EndtlessDatapack.zip
          cd 2_Datapack
          zip -rq ../EndtlessDatapack.zip pack.mcmeta data
          cd ..

      - name: Compute SHA1 of EndtlessPack.zip
        id: sha1
        run: |
          SHA=$(sha1sum EndtlessPack.zip | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: EndtlessPack ${{ github.ref_name }}
          body: |
            Resource pack + datapack vanilla compativel com Minecraft 1.21.4 - 1.21.11+ (Paper).

            45 itens customizados de 6 colecoes premium, sem precisar de plugin pago.

            **SHA1 do EndtlessPack.zip:** `${{ steps.sha1.outputs.sha }}`

            ## Como usar

            **Resource Pack** (no server.properties):
            ```properties
            resource-pack=https://github.com/o0renan0o/endtless/releases/download/${{ github.ref_name }}/EndtlessPack.zip
            resource-pack-sha1=${{ steps.sha1.outputs.sha }}
            require-resource-pack=true
            resource-pack-prompt=Aceite o pack para ver os itens exclusivos do Endtless!
            ```

            **Datapack:** upload do `EndtlessDatapack.zip` em `world/datapacks/` (sem extrair).

            **Testar no jogo:** `/trigger endtless_shop`
          files: |
            EndtlessPack.zip
            EndtlessDatapack.zip
          generate_release_notes: false
          draft: false
          prerelease: false
